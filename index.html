<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPE Al-Azhar International Student Chapter</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet">

<!-- React CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

<!-- Firebase CDN (All Compat including Storage) -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

<style>
/* ============================================================
   DESIGN SYSTEM — SPE Al-Azhar 26/27 Season
   Color Palette: From "الوان.jpeg" — Deep Navy + Electric Cyan
   + Gold Accent for 26/27 Branding
   ============================================================ */
:root {
  --navy:      #030C1E;
  --navy2:     #061428;
  --navy3:     #091D38;
  --navy4:     #0D2449;
  --blue:      #0A4FA3;
  --blue2:     #1565C0;
  --blue3:     #1E88E5;
  --cyan:      #00D4FF;
  --cyan2:     #00B8D9;
  --cyan3:     #00E5FF;
  --gold:      #F5A623;
  --gold2:     #E8941A;
  --gold3:     #FFB940;
  --silver:    #B8CDE0;
  --silver2:   #7A9BB5;
  --white:     #FFFFFF;
  --off:       #E8F2FA;
  --dim:       rgba(255,255,255,0.55);
  --dimline:   rgba(255,255,255,0.55);
  --dimmer:    rgba(255,255,255,0.35);
  --dimmest:   rgba(255,255,255,0.18);
  --border:    rgba(0,180,220,0.18);
  --border2:   rgba(255,255,255,0.07);
  --glow:      0 0 40px rgba(0,212,255,0.18);
  --glow2:     0 0 80px rgba(0,212,255,0.12);
  --glow-gold: 0 0 30px rgba(245,166,35,0.25);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'DM Sans',sans-serif;background:var(--navy);color:var(--white);overflow-x:hidden;cursor:default;}
#root{min-height:100vh;}
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:var(--navy2);}
::-webkit-scrollbar-thumb{background:var(--blue2);border-radius:4px;}

/* ---- PAGE TRANSITIONS ---- */
.page-enter{animation:pgIn 0.45s cubic-bezier(.25,.46,.45,.94) both;}
@keyframes pgIn{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}

/* ---- PRELOADER ---- */
#preloader{position:fixed;inset:0;z-index:9999;background:var(--navy);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;transition:opacity .8s ease,visibility .8s ease;}
#preloader.out{opacity:0;visibility:hidden;pointer-events:none;}
.pre-logo{width:90px;animation:preFloat 1.5s ease-in-out infinite alternate;}
@keyframes preFloat{from{transform:translateY(0);}to{transform:translateY(-8px);}}
.pre-bar{width:180px;height:2px;background:rgba(255,255,255,0.1);border-radius:2px;overflow:hidden;}
.pre-fill{height:100%;background:linear-gradient(90deg,var(--blue2),var(--cyan));border-radius:2px;animation:preLoad 1.2s ease-out forwards;}
@keyframes preLoad{from{width:0}to{width:100%}}
.pre-text{font-family:'Syne',sans-serif;font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--dimmer);margin-top:4px;}

/* ---- CURSOR ---- */
.cursor-dot{width:8px;height:8px;background:var(--cyan);border-radius:50%;position:fixed;pointer-events:none;z-index:10000;transform:translate(-50%,-50%);transition:transform 0.1s ease;mix-blend-mode:screen;}
.cursor-ring{width:36px;height:36px;border:1px solid rgba(0,212,255,0.4);border-radius:50%;position:fixed;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:transform 0.15s ease,width 0.2s ease,height 0.2s ease;}

/* ---- NAVIGATION ---- */
.nav{position:fixed;top:0;left:0;right:0;z-index:600;padding:16px 52px;display:flex;align-items:center;justify-content:space-between;transition:background .4s ease,padding .4s ease;}
.nav.solid{background:rgba(3,12,30,0.96);backdrop-filter:blur(24px);padding:12px 52px;border-bottom:1px solid var(--border);}
.nav-brand{display:flex;align-items:center;gap:14px;cursor:pointer;}
.nav-logo-img{height:44px;width:auto;object-fit:contain;filter:drop-shadow(0 0 8px rgba(0,212,255,0.4));transition:.3s;}
.nav-brand:hover .nav-logo-img{filter:drop-shadow(0 0 16px rgba(0,212,255,0.7));transform:scale(1.03);}
.nav-brand-text{font-family:'Syne',sans-serif;}
.nav-brand-text .top{font-size:15px;font-weight:800;letter-spacing:1.5px;color:var(--white);}
.nav-brand-text .bot{font-size:10px;font-weight:500;letter-spacing:3px;text-transform:uppercase;color:var(--cyan2);}
.nav-links{display:flex;align-items:center;gap:8px;list-style:none;}
.nav-links li button{background:none;border:none;padding:8px 16px;color:var(--dimmer);font-size:12px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;cursor:pointer;transition:.2s;font-family:'DM Sans',sans-serif;border-radius:4px;}
.nav-links li button:hover{color:var(--white);background:rgba(255,255,255,0.06);}
.nav-links li button.active{color:var(--cyan);}
.nav-season-badge{padding:6px 14px;background:linear-gradient(135deg,var(--gold2),var(--gold3));color:var(--navy);font-size:10px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;border-radius:3px;box-shadow:var(--glow-gold);}
.nav-admin-btn{padding:9px 22px;background:transparent;border:1.5px solid rgba(0,212,255,0.4);color:var(--cyan);font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:.25s;border-radius:5px;font-family:'DM Sans',sans-serif;}
.nav-admin-btn:hover{background:var(--cyan);color:var(--navy);border-color:var(--cyan);}
.nav-burger{display:none;flex-direction:column;gap:5px;background:none;border:none;cursor:pointer;}
.nav-burger span{width:22px;height:2px;background:var(--white);display:block;transition:.3s;border-radius:2px;}

/* ---- HERO ---- */
.hero{min-height:100vh;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden;background:radial-gradient(ellipse 70% 60% at 50% 40%,rgba(10,79,163,0.3) 0%,transparent 65%),radial-gradient(ellipse 40% 40% at 80% 70%,rgba(0,180,220,0.12) 0%,transparent 55%),var(--navy);}
.hero-grid{position:absolute;inset:0;pointer-events:none;background-image:linear-gradient(rgba(0,212,255,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,0.04) 1px,transparent 1px);background-size:60px 60px;mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 20%,transparent 75%);}
.hero-particles{position:absolute;inset:0;pointer-events:none;overflow:hidden;}
.particle{position:absolute;border-radius:50%;background:var(--cyan);opacity:0;animation:partFloat var(--dur,6s) var(--delay,0s) ease-in-out infinite;}
@keyframes partFloat{0%,100%{opacity:0;transform:translateY(0) scale(0.5);}50%{opacity:var(--op,0.4);transform:translateY(-60px) scale(1);}}
.hero-content{position:relative;z-index:2;display:flex;align-items:center;justify-content:center;gap:80px;flex-wrap:wrap;max-width:1300px;width:100%;padding:0 40px;}
.hero-logo-wrap{flex-shrink:0;position:relative;}
.hero-logo-img{width:320px;max-width:90vw;filter:drop-shadow(0 0 40px rgba(0,212,255,0.35));animation:logoFloat 4s ease-in-out infinite alternate;}
@keyframes logoFloat{from{transform:translateY(0) rotate(-0.5deg);}to{transform:translateY(-12px) rotate(0.5deg);}}
.hero-logo-ring{position:absolute;inset:-20px;border:1px solid rgba(0,212,255,0.15);border-radius:50%;animation:ringPulse 3s ease-in-out infinite;}
.hero-logo-ring2{position:absolute;inset:-40px;border:1px solid rgba(0,212,255,0.07);border-radius:50%;animation:ringPulse 3s ease-in-out infinite reverse;}
@keyframes ringPulse{0%,100%{transform:scale(1);opacity:1;}50%{transform:scale(1.05);opacity:0.5;}}
.hero-text{max-width:580px;}
.hero-pill{display:inline-flex;align-items:center;gap:8px;background:rgba(245,166,35,0.1);border:1px solid rgba(245,166,35,0.35);padding:7px 18px;border-radius:100px;margin-bottom:28px;font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--gold);}
.hero-pill::before{content:'';width:6px;height:6px;background:var(--gold);border-radius:50%;animation:blinkDot 1.5s ease infinite;}
@keyframes blinkDot{0%,100%{opacity:1;box-shadow:0 0 8px var(--gold);}50%{opacity:.2;box-shadow:none;}}
.hero-h1{font-family:'Syne',sans-serif;font-size:clamp(42px,6vw,76px);font-weight:800;line-height:.95;letter-spacing:-1px;margin-bottom:22px;}
.hero-h1 .line2{color:var(--cyan);display:block;}
.hero-h1 .line3{color:var(--silver2);font-size:.55em;font-weight:500;letter-spacing:1px;display:block;margin-top:6px;}
.hero-desc{font-size:16px;color:var(--dim);line-height:1.8;font-weight:300;max-width:500px;margin-bottom:40px;}
.hero-btns{display:flex;gap:14px;flex-wrap:wrap;}
.btn-primary{padding:14px 36px;background:linear-gradient(135deg,var(--blue2),var(--blue3));color:var(--white);border:none;border-radius:6px;font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:.3s;box-shadow:0 4px 24px rgba(10,79,163,0.4),var(--glow);font-family:'DM Sans',sans-serif;}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(30,136,229,0.5),var(--glow);}
.btn-gold{padding:14px 36px;background:linear-gradient(135deg,var(--gold2),var(--gold3));color:var(--navy);border:none;border-radius:6px;font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:.3s;box-shadow:var(--glow-gold);font-family:'DM Sans',sans-serif;}
.btn-gold:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(245,166,35,0.5);}
.btn-outline{padding:14px 36px;background:transparent;color:var(--white);border:1.5px solid rgba(255,255,255,0.2);border-radius:6px;font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:.3s;font-family:'DM Sans',sans-serif;}
.btn-outline:hover{border-color:var(--cyan);color:var(--cyan);}
.hero-scroll{position:absolute;bottom:36px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:8px;color:var(--dimmest);font-size:10px;letter-spacing:2px;text-transform:uppercase;}
.scroll-line{width:1px;height:46px;background:linear-gradient(to bottom,rgba(0,212,255,0.5),transparent);animation:scrollAnim 2s ease-in-out infinite;}
@keyframes scrollAnim{0%{transform:scaleY(0);transform-origin:top;}50%{transform:scaleY(1);transform-origin:top;}50.001%{transform-origin:bottom;}100%{transform:scaleY(0);transform-origin:bottom;}}

/* ---- STATS BAR ---- */
.stats-bar{background:linear-gradient(90deg,var(--blue) 0%,var(--blue2) 40%,var(--cyan2) 100%);padding:36px 52px;display:grid;grid-template-columns:repeat(4,1fr);gap:24px;}
.stat{text-align:center;}
.stat-n{font-family:'Syne',sans-serif;font-size:48px;font-weight:800;letter-spacing:1px;line-height:1;}
.stat-l{font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;opacity:.8;margin-top:4px;}

/* ---- SECTIONS ---- */
.section{padding:96px 52px;}
.section-inner{max-width:1380px;margin:0 auto;}
.sec-eyebrow{font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:12px;}
.sec-title{font-family:'Syne',sans-serif;font-size:clamp(38px,5.5vw,72px);font-weight:800;line-height:.93;margin-bottom:16px;}
.sec-title em{font-style:normal;color:var(--cyan);}

/* ---- ABOUT ---- */
.about-grid{display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:center;max-width:1200px;margin:0 auto;}
.about-visual{position:relative;aspect-ratio:4/3;background:var(--navy3);border:1px solid var(--border);overflow:hidden;border-radius:4px;}
.about-visual::before,.about-visual::after{content:'';position:absolute;width:40px;height:40px;}
.about-visual::before{top:0;left:0;border-top:2px solid var(--gold);border-left:2px solid var(--gold);}
.about-visual::after{bottom:0;right:0;border-bottom:2px solid var(--cyan);border-right:2px solid var(--cyan);}
.about-vis-inner{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at center,rgba(0,180,220,0.07),transparent);}
.about-vis-logo{width:65%;opacity:0.7;filter:drop-shadow(0 0 20px rgba(0,212,255,0.3));}
.about-content p{color:var(--dim);font-size:15.5px;line-height:1.85;margin-bottom:16px;font-weight:300;}
.about-chip{display:inline-flex;align-items:center;gap:14px;background:var(--navy3);border:1px solid var(--border);padding:14px 22px;margin-top:14px;border-radius:4px;}
.chip-yr{font-family:'Syne',sans-serif;font-size:38px;font-weight:800;color:var(--gold);line-height:1;}
.chip-tx{font-size:11px;color:var(--dimmer);text-transform:uppercase;letter-spacing:1.5px;line-height:1.6;}

/* ---- VM CARDS ---- */
.vm-grid{display:grid;grid-template-columns:1fr 1fr;gap:3px;margin-top:52px;}
.vm-card{background:var(--navy2);padding:56px 52px;border-bottom:3px solid transparent;transition:.4s;cursor:default;position:relative;overflow:hidden;}
.vm-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--blue2),var(--cyan));transform:scaleX(0);transform-origin:left;transition:.45s;}
.vm-card:hover::after{transform:scaleX(1);}
.vm-card:hover{background:rgba(10,30,56,0.9);}
.vm-n{position:absolute;top:16px;right:24px;font-family:'Syne',sans-serif;font-size:88px;font-weight:800;color:rgba(0,212,255,0.04);line-height:1;}
.vm-card h3{font-family:'Syne',sans-serif;font-size:38px;font-weight:800;margin-bottom:16px;}
.vm-card p{color:var(--dim);font-size:15px;line-height:1.8;font-weight:300;}

/* ---- BOARD MEMBERS (26/27 Season) ---- */
.board-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:3px;margin-top:52px;}
.board-card{background:var(--navy3);border:1px solid var(--border2);transition:.35s;overflow:hidden;position:relative;}
.board-card:hover{border-color:rgba(245,166,35,0.3);transform:translateY(-3px);box-shadow:var(--glow-gold);}
.board-card-img{width:100%;height:220px;object-fit:cover;display:block;}
.board-card-img-placeholder{width:100%;height:220px;background:radial-gradient(ellipse at center,rgba(0,180,220,0.1),var(--navy4));display:flex;align-items:center;justify-content:center;font-size:48px;}
.board-card-body{padding:22px 24px;}
.board-card-role{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:6px;}
.board-card h3{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;margin-bottom:8px;}
.board-card p{color:var(--dimmer);font-size:13px;line-height:1.7;}
.board-badge{position:absolute;top:12px;right:12px;background:linear-gradient(135deg,var(--gold2),var(--gold3));color:var(--navy);font-size:8px;font-weight:800;letter-spacing:1.5px;padding:3px 8px;text-transform:uppercase;border-radius:2px;}

/* ---- TEAM SECTION STYLES ---- */
.team-container{margin-bottom:64px;}
.team-title{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:var(--cyan);border-bottom:1px solid var(--border);padding-bottom:12px;margin-bottom:24px;text-transform:uppercase;letter-spacing:1px;}

/* ---- MISSION PILLARS ---- */
.m-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:3px;margin-top:52px;}
.m-card{background:var(--navy2);padding:46px 34px;border-top:3px solid transparent;transition:.3s;}
.m-card:hover{border-top-color:var(--gold);background:var(--navy3);}
.m-icon{width:58px;height:58px;background:rgba(245,166,35,0.08);border:1px solid rgba(245,166,35,0.2);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:24px;margin-bottom:22px;}
.m-card h3{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;margin-bottom:12px;}
.m-card p{color:var(--dimmer);font-size:13.5px;line-height:1.78;}

/* ---- EVENTS GRID ---- */
.events-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:3px;margin-top:52px;}
.event-card{background:var(--navy3);border:1px solid var(--border2);overflow:hidden;transition:.3s;position:relative;}
.event-card:hover{border-color:rgba(0,212,255,0.3);transform:translateY(-3px);box-shadow:var(--glow);}
.event-card-img{width:100%;height:200px;object-fit:cover;display:block;}
.event-card-img-placeholder{width:100%;height:200px;background:linear-gradient(135deg,var(--navy4),var(--navy3));display:flex;align-items:center;justify-content:center;font-size:40px;}
.event-card-body{padding:22px;}
.event-card-type{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--cyan2);margin-bottom:8px;}
.event-card h3{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;margin-bottom:10px;line-height:1.35;}
.event-card p{color:var(--dimmer);font-size:13.5px;line-height:1.75;margin-bottom:14px;}
.event-card-meta{display:flex;flex-wrap:wrap;gap:10px;font-size:11px;color:rgba(255,255,255,.28);padding-top:14px;border-top:1px solid var(--border2);}

/* ---- ACHIEVEMENTS ---- */
.ach-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;max-width:1380px;margin:48px auto 0;}
.ach-card{background:var(--navy3);padding:44px 36px;position:relative;overflow:hidden;transition:.3s;}
.ach-card:hover{background:var(--navy4);}
.ach-bg{position:absolute;top:8px;right:16px;font-family:'Syne',sans-serif;font-size:78px;font-weight:800;color:rgba(0,212,255,0.035);line-height:1;pointer-events:none;}
.ach-yr{display:inline-block;background:var(--blue2);padding:3px 12px;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:16px;border-radius:2px;}
.ach-card h3{font-family:'Syne',sans-serif;font-size:19px;font-weight:700;margin-bottom:11px;line-height:1.35;}
.ach-card p{color:var(--dimmer);font-size:13.5px;line-height:1.75;}

/* ---- TIMELINE ---- */
.timeline{max-width:860px;margin:64px auto 0;position:relative;padding-left:32px;}
.timeline::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:linear-gradient(to bottom,var(--gold),var(--cyan),transparent);}
.tl-item{position:relative;margin-bottom:48px;}
.tl-dot{position:absolute;left:-39px;top:4px;width:14px;height:14px;border-radius:50%;background:var(--gold);border:2px solid var(--navy);box-shadow:0 0 12px rgba(245,166,35,0.5);}
.tl-yr{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:6px;}
.tl-item h3{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;margin-bottom:8px;}
.tl-item p{color:var(--dim);font-size:14px;line-height:1.75;}

/* ---- LOCATION ---- */
.loc-wrap{max-width:1200px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;border:1px solid var(--border);border-radius:4px;overflow:hidden;}
.loc-map iframe{width:100%;height:100%;min-height:400px;border:none;filter:grayscale(60%) hue-rotate(180deg) invert(88%) contrast(88%);}
.loc-info{padding:56px;background:var(--navy2);display:flex;flex-direction:column;justify-content:center;}
.loc-info h3{font-family:'Syne',sans-serif;font-size:46px;font-weight:800;line-height:.95;margin-bottom:28px;}
.loc-row{display:flex;gap:14px;margin-bottom:20px;padding-bottom:20px;border-bottom:1px solid var(--border2);}
.loc-row:last-of-type{border-bottom:none;margin-bottom:0;}
.loc-ic{width:40px;height:40px;background:rgba(245,166,35,0.08);border:1px solid rgba(245,166,35,0.2);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px;border-radius:4px;}
.loc-t strong{display:block;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--dimmest);margin-bottom:3px;}
.loc-t span{font-size:14px;color:var(--dim);}
.btn-dir{display:inline-flex;align-items:center;gap:9px;margin-top:18px;padding:12px 26px;background:linear-gradient(135deg,var(--gold2),var(--gold3));color:var(--navy);text-decoration:none;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;transition:.2s;border-radius:4px;}
.btn-dir:hover{opacity:.9;}

/* ---- NEWSLETTER ---- */
.nl-sec{background:linear-gradient(135deg,var(--navy3),var(--navy4));padding:88px 52px;text-align:center;border-top:1px solid var(--border);}
.nl-sec h2{font-family:'Syne',sans-serif;font-size:clamp(34px,4.5vw,64px);font-weight:800;margin-bottom:10px;}
.nl-sec p{color:var(--dim);font-size:16px;margin-bottom:36px;font-weight:300;}
.nl-form{display:flex;max-width:460px;margin:0 auto;border:1.5px solid var(--border);border-radius:6px;overflow:hidden;}
.nl-form input{flex:1;padding:15px 20px;background:rgba(10,79,163,0.1);border:none;color:var(--white);font-size:14px;outline:none;font-family:'DM Sans',sans-serif;}
.nl-form input::placeholder{color:var(--dimmest);}
.nl-form button{padding:15px 24px;background:linear-gradient(135deg,var(--gold2),var(--gold3));border:none;color:var(--navy);font-weight:700;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:.2s;font-family:'DM Sans',sans-serif;white-space:nowrap;}
.nl-form button:hover{opacity:.9;}

/* ---- FOOTER ---- */
footer{background:var(--navy2);padding:72px 52px 34px;}
.ft-top{max-width:1200px;margin:0 auto 48px;display:grid;grid-template-columns:2fr 1fr 1fr;gap:52px;}
.ft-brand p{color:var(--dimmest);font-size:14px;line-height:1.75;margin-top:16px;max-width:265px;font-weight:300;}
.ft-soc{display:flex;gap:8px;margin-top:20px;}
.soc-btn{width:36px;height:36px;background:var(--navy3);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;color:var(--dimmer);text-decoration:none;font-size:12px;transition:.2s;border-radius:4px;cursor:pointer;font-weight:700;}
.soc-btn:hover{background:var(--gold2);border-color:var(--gold2);color:var(--navy);}
.ft-links h4{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:20px;padding-bottom:10px;border-bottom:1px solid var(--border2);}
.ft-links ul{list-style:none;}
.ft-links li{margin-bottom:9px;}
.ft-links a,.ft-links button{background:none;border:none;color:var(--dimmest);font-size:14px;transition:.2s;cursor:pointer;font-family:'DM Sans',sans-serif;padding:0;text-decoration:none;font-weight:300;}
.ft-links a:hover,.ft-links button:hover{color:var(--white);}
.ft-bot{border-top:1px solid var(--border2);padding-top:26px;max-width:1200px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;color:rgba(255,255,255,.2);font-size:13px;flex-wrap:wrap;gap:9px;}
.ft-bot a{color:var(--gold);}
.ft-logo-wrap{display:flex;align-items:center;gap:12px;}
.ft-logo-img{height:42px;filter:drop-shadow(0 0 8px rgba(0,212,255,0.3));}

/* ---- PAGE HEADERS ---- */
.page-hero{padding:140px 52px 80px;background:linear-gradient(135deg,var(--navy2) 0%,var(--navy3) 100%);border-bottom:1px solid var(--border);position:relative;overflow:hidden;}
.page-hero::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(0,212,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,0.03) 1px,transparent 1px);background-size:60px 60px;pointer-events:none;}
.page-hero-inner{max-width:1380px;margin:0 auto;position:relative;z-index:1;}
.page-hero .sec-eyebrow{font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:16px;}
.page-hero h1{font-family:'Syne',sans-serif;font-size:clamp(48px,7vw,96px);font-weight:800;line-height:.9;margin-bottom:20px;}
.page-hero h1 em{font-style:normal;color:var(--cyan);}
.page-hero p{color:var(--dim);font-size:17px;line-height:1.8;max-width:560px;font-weight:300;}

/* ---- ADMIN LOGIN ---- */
.admin-login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:80px 24px;background:var(--navy);}
.admin-login-box{background:var(--navy2);border:1px solid var(--border);padding:52px 44px;width:420px;max-width:96vw;border-radius:8px;box-shadow:var(--glow2);}
.admin-login-box h2{font-family:'Syne',sans-serif;font-size:34px;font-weight:800;margin-bottom:6px;}
.admin-login-sub{color:var(--dimmer);font-size:14px;margin-bottom:32px;font-weight:300;}
.admin-err{background:rgba(255,80,80,0.08);border:1px solid rgba(255,80,80,0.3);color:#ff6b6b;padding:10px 14px;font-size:13px;margin-bottom:14px;border-radius:4px;}

/* ---- ADMIN PANEL ---- */
.admin-panel{min-height:100vh;display:flex;flex-direction:column;background:var(--navy);}
.admin-topbar{padding:18px 36px;background:var(--navy2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.admin-logo{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;letter-spacing:1px;}
.admin-body{display:flex;flex:1;overflow:hidden;}
.admin-nav{width:220px;background:rgba(0,0,0,0.2);border-right:1px solid var(--border);padding:24px 0;flex-shrink:0;overflow-y:auto;}
.admin-nav-btn{display:flex;align-items:center;gap:10px;padding:12px 22px;color:var(--dimmer);cursor:pointer;font-size:12px;font-weight:700;letter-spacing:.5px;border:none;background:none;width:100%;text-align:left;transition:.2s;font-family:'DM Sans',sans-serif;}
.admin-nav-btn:hover{background:rgba(245,166,35,0.06);color:var(--white);}
.admin-nav-btn.on{background:rgba(245,166,35,0.1);color:var(--gold);border-right:3px solid var(--gold);}
.admin-nav-btn .ni{font-size:16px;width:20px;text-align:center;}
.admin-content{flex:1;overflow-y:auto;padding:32px;}
.admin-tab-title{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;margin-bottom:4px;}
.admin-tab-sub{color:var(--dimmer);font-size:13px;margin-bottom:24px;font-weight:300;}

/* ---- FORMS ---- */
.f-form{display:flex;flex-direction:column;gap:14px;}
.f-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.f-g{display:flex;flex-direction:column;gap:6px;}
.f-g label{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--dimmest);}
.f-g input,.f-g textarea,.f-g select{background:var(--navy3);border:1px solid var(--border);color:var(--white);padding:10px 14px;font-size:13.5px;font-family:'DM Sans',sans-serif;outline:none;transition:.2s;border-radius:4px;width:100%;}
.f-g input:focus,.f-g textarea:focus,.f-g select:focus{border-color:rgba(245,166,35,0.5);box-shadow:0 0 0 3px rgba(245,166,35,0.07);}
.f-g textarea{resize:vertical;min-height:88px;}
.f-g select option{background:var(--navy2);}
.b-sub{padding:11px 28px;background:linear-gradient(135deg,var(--gold2),var(--gold3));color:var(--navy);border:none;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:.2s;align-self:flex-start;border-radius:4px;font-family:'DM Sans',sans-serif;}
.b-sub:hover{opacity:.9;}
.b-sub:disabled{opacity:.4;cursor:not-allowed;}
.suc-m{background:rgba(0,200,100,0.07);border:1px solid rgba(0,200,100,0.25);color:#00e676;padding:10px 14px;font-size:13px;font-weight:600;margin-bottom:14px;border-radius:4px;}
.err-m{background:rgba(255,80,80,0.07);border:1px solid rgba(255,80,80,0.25);color:#ff6b6b;padding:10px 14px;font-size:13px;border-radius:4px;}
.dv{border:none;border-top:1px solid var(--border2);margin:22px 0;}

/* ---- ADMIN LIST ITEMS ---- */
.a-list{margin-top:16px;}
.a-item{background:var(--navy3);border:1px solid var(--border2);padding:12px 16px;margin-bottom:5px;display:flex;align-items:center;justify-content:space-between;transition:.2s;border-radius:4px;}
.a-item:hover{border-color:var(--border);}
.a-ii strong{font-size:13px;display:block;margin-bottom:2px;}
.a-ii span{color:var(--dimmest);font-size:11px;}
.b-del{padding:5px 12px;background:rgba(255,80,80,0.07);border:1px solid rgba(255,80,80,0.2);color:#ff6b6b;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:.2s;border-radius:3px;font-family:'DM Sans',sans-serif;}
.b-del:hover{background:rgba(255,80,80,0.2);}

/* ---- SPINNER ---- */
.spinner{display:inline-block;width:18px;height:18px;border:2px solid rgba(255,255,255,.2);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:8px;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ---- LOADING OVERLAY ---- */
.loading-screen{min-height:60vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;color:var(--dimmer);}
.loading-screen .spinner{width:36px;height:36px;border-width:3px;}

/* ---- EMPTY STATE ---- */
.empty-state{text-align:center;padding:72px 40px;color:rgba(255,255,255,.18);}
.empty-state .ei{font-size:50px;margin-bottom:12px;opacity:.22;}
.empty-state p{font-size:15px;}

/* ---- CUSTOM MODAL STYLES (No alerts!) ---- */
.custom-modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(3, 12, 30, 0.85);
  backdrop-filter: blur(8px);
  z-index: 10001;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.custom-modal-box {
  background: var(--navy2);
  border: 1.5px solid var(--border);
  box-shadow: var(--glow2);
  border-radius: 8px;
  width: 100%;
  max-width: 440px;
  padding: 32px;
  text-align: center;
  animation: pgIn 0.3s cubic-bezier(.25,.46,.45,.94);
}
.custom-modal-icon {
  font-size: 48px;
  margin-bottom: 16px;
}
.custom-modal-title {
  font-family: 'Syne', sans-serif;
  font-size: 24px;
  font-weight: 800;
  margin-bottom: 8px;
}
.custom-modal-text {
  color: var(--dim);
  font-size: 14.5px;
  line-height: 1.6;
  margin-bottom: 24px;
}
.custom-modal-actions {
  display: flex;
  gap: 12px;
  justify-content: center;
}

/* ---- NEW DRAG & DROP / FILE UPLOAD BUTTONS ---- */
.file-upload-wrapper {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.file-upload-box {
  background: rgba(10, 79, 163, 0.08);
  border: 1.5px dashed var(--border);
  border-radius: 4px;
  padding: 16px;
  text-align: center;
  cursor: pointer;
  transition: .2s;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  position: relative;
}
.file-upload-box:hover {
  background: rgba(10, 79, 163, 0.16);
  border-color: var(--cyan);
}
.file-upload-box input[type="file"] {
  position: absolute;
  inset: 0;
  opacity: 0;
  cursor: pointer;
}
.file-upload-icon {
  font-size: 24px;
  color: var(--cyan);
}
.file-upload-text {
  font-size: 12px;
  font-weight: 600;
  color: var(--dimmer);
}
.file-upload-text strong {
  color: var(--cyan);
}

/* ---- MOBILE ---- */
@media(max-width:960px){
  .nav,.nav.solid{padding:12px 22px;}
  .nav-links{display:none;}
  .nav-links.open{display:flex;flex-direction:column;position:fixed;top:0;left:0;right:0;bottom:0;background:var(--navy);z-index:590;align-items:center;justify-content:center;gap:24px;}
  .nav-links.open li button{font-size:18px;}
  .nav-burger{display:flex;}
  .nav-season-badge{display:none;}
  .section,.page-hero{padding:80px 22px 56px;}
  .stats-bar{grid-template-columns:repeat(2,1fr);padding:40px 22px;}
  .about-grid,.vm-grid,.loc-wrap{grid-template-columns:1fr;}
  .m-grid{grid-template-columns:1fr 1fr;}
  .ach-grid,.board-grid,.events-grid{grid-template-columns:1fr;}
  .ft-top{grid-template-columns:1fr;gap:34px;}
  .ft-bot{flex-direction:column;text-align:center;}
  footer{padding:52px 22px 26px;}
  .nl-sec{padding:60px 22px;}
  .nl-form{flex-direction:column;}
  .hero-content{flex-direction:column;text-align:center;padding:0 22px;gap:40px;}
  .hero-logo-img{width:220px;}
  .hero-btns{justify-content:center;}
  .admin-body{flex-direction:column;}
  .admin-nav{width:100%;display:flex;flex-wrap:wrap;padding:9px;border-right:none;border-bottom:1px solid var(--border);}
  .admin-nav-btn{flex:1;min-width:55px;justify-content:center;padding:8px;}
  .admin-nav-btn .ni{margin:0;}
  .admin-nav-btn span:not(.ni){display:none;}
  .f-row{grid-template-columns:1fr;}
}
@media(max-width:600px){.m-grid{grid-template-columns:1fr;}}

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ─── LOGO ────────────────────────────────────────────────────────────────────
const LOGO_URI ="logo.jpg";

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,8); }

// ─── PARTICLES ───────────────────────────────────────────────────────────────
function Particles(){
  const particles = Array.from({length:14},(_,i)=>({
    left:`${5+i*7}%`, top:`${10+(i%5)*18}%`,
    width:`${2+Math.random()*3}px`, height:`${2+Math.random()*3}px`,
    dur:`${5+Math.random()*5}s`, delay:`${Math.random()*4}s`, op:0.2+Math.random()*0.4,
  }));
  return (
    <div className="hero-particles">
      {particles.map((p,i)=>(
        <div key={i} className="particle" style={{left:p.left,top:p.top,width:p.width,height:p.height,'--dur':p.dur,'--delay':p.delay,'--op':p.op}}/>
      ))}
    </div>
  );
}

// ─── NAVIGATION ──────────────────────────────────────────────────────────────
function Nav({ page, go, user, onLogout, sc, mob, setMob }){
  const pages = [
    {key:'home',label:'Home'},
    {key:'vision',label:'Vision & Mission'},
    {key:'timeline',label:'Timeline'},
    {key:'events',label:'Events'},
  ];
  return (
    <nav className={`nav${sc||page!=='home'?' solid':''}`}>
      <div className="nav-brand" onClick={()=>go('home')}>
        <img src={LOGO_URI} className="nav-logo-img" alt="SPE Al-Azhar"/>
        <div className="nav-brand-text">
          <div className="top">SPE AL-AZHAR</div>
          <div className="bot">International Student Chapter</div>
        </div>
      </div>
      <ul className={`nav-links${mob?' open':''}`}>
        {pages.map(p=>(
          <li key={p.key}>
            <button className={page===p.key?'active':''} onClick={()=>go(p.key)}>{p.label}</button>
          </li>
        ))}
        <li>
          <span className="nav-season-badge">Season 26/27</span>
        </li>
      </ul>
      <div style={{display:'flex',gap:10,alignItems:'center'}}>
        {user
          ? <>
              <span style={{color:'var(--dimmer)',fontSize:12}}>Admin</span>
              <button className="nav-admin-btn" onClick={()=>go('admin')}>Panel</button>
              <button className="nav-admin-btn" onClick={onLogout} style={{borderColor:'rgba(255,80,80,0.4)',color:'#ff6b6b'}}>Logout</button>
            </>
          : <button className="nav-admin-btn" onClick={()=>go('admin')}>Admin</button>
        }
        <button className="nav-burger" onClick={()=>setMob(o=>!o)}><span/><span/><span/></button>
      </div>
    </nav>
  );
}

// ─── HOME PAGE ────────────────────────────────────────────────────────────────
function HomePage({ go, stats, boardMembers, events, showModal }){
  const displayStats = [
    { n: stats?.founded || '2005', l: 'Founded' },
    { n: stats?.awards || '7+', l: 'Outstanding Awards' },
    { n: stats?.rank || '1st', l: 'Egypt & Middle East' },
    { n: stats?.global || 'Top 5%', l: 'SPE Worldwide' },
  ];

  const featuredMembers = boardMembers.slice(0,3);
  const upcomingEvents = events.slice(0,3);

  const staticAch = [
    {id:'s1',year:'2022',title:'Outstanding Award 2022',desc:'Highest SPE honor — top 5% of student chapters worldwide. #1 in Egypt and the Middle East.',badge:'🥇'},
    {id:'s2',year:'2021',title:'Outstanding Award 2021',desc:'Top 5% worldwide. First place in Egypt and the Middle East for the second consecutive cycle.',badge:'🥇'},
    {id:'s3',year:'2020',title:'Excellence Award 2020',desc:'Second-highest SPE designation — next 10% of eligible student chapters globally.',badge:'🥈'},
  ];

  return (
    <div className="page-enter">
      {/* HERO */}
      <section className="hero">
        <div className="hero-grid"/>
        <Particles/>
        <div className="hero-content">
          <div className="hero-logo-wrap">
            <div className="hero-logo-ring"/>
            <div className="hero-logo-ring2"/>
            <img src={LOGO_URI} className="hero-logo-img" alt="SPE Al-Azhar Logo"/>
          </div>
          <div className="hero-text">
            <div className="hero-pill">⚡ Season 26/27 — Cairo, Egypt</div>
            <h1 className="hero-h1">
              SPE
              <em className="line2">AL-AZHAR</em>
              <span className="line3">International Student Chapter</span>
            </h1>
            <p className="hero-desc">Society of Petroleum Engineers — Al-Azhar University Student Chapter. Building the next generation of energy professionals since 2005.</p>
            <div className="hero-btns">
              <button className="btn-primary" onClick={()=>go('vision')}>Explore More</button>
              <button className="btn-gold" onClick={()=>go('events')}>View Events</button>
            </div>
          </div>
        </div>
        <div className="hero-scroll"><span>Scroll</span><div className="scroll-line"/></div>
      </section>

      {/* STATS BAR */}
      <div className="stats-bar">
        {displayStats.map(s=>(
          <div className="stat" key={s.l}>
            <div className="stat-n">{s.n}</div>
            <div className="stat-l">{s.l}</div>
          </div>
        ))}
      </div>

      {/* ABOUT */}
      <section className="section" id="about" style={{background:'var(--navy2)'}}>
        <div className="about-grid">
          <div className="about-visual">
            <div className="about-vis-inner">
              <img src={LOGO_URI} className="about-vis-logo" alt="Logo"/>
            </div>
          </div>
          <div className="about-content">
            <div className="sec-eyebrow">About Us</div>
            <h2 className="sec-title">Welcome to the<br/><em>1st Chapter</em><br/>of SPE at AUSC</h2>
            <p>The 1st student chapter of the Society of Petroleum Engineers at Al-Azhar University was founded in June 2005 by students of the Petroleum Engineering Department.</p>
            <p>We are a non-profit organization aimed at enhancing students' skills, sharing knowledge, providing career information, and helping members achieve their professional goals.</p>
            <div className="about-chip">
              <div className="chip-yr">2005</div>
              <div className="chip-tx">Year<br/>Founded</div>
            </div>
          </div>
        </div>
      </section>

      {/* BOARD MEMBERS PREVIEW */}
      {featuredMembers.length > 0 && (
        <section className="section" style={{background:'var(--navy3)'}}>
          <div className="section-inner">
            <div className="sec-eyebrow">Season 26/27 Board</div>
            <h2 className="sec-title">Operation<br/><em>Committees</em></h2>
            <div className="board-grid" style={{marginTop:52}}>
              {featuredMembers.map(m=>(
                <div className="board-card" key={m.id}>
                  {m.imageUrl
                    ? <img className="board-card-img" src={m.imageUrl} alt={m.name} onError={e=>e.target.style.display='none'}/>
                    : <div className="board-card-img-placeholder">👤</div>
                  }
                  {m.role?.toLowerCase().includes('head') && <div className="board-badge">HEAD</div>}
                  <div className="board-card-body">
                    <div className="board-card-role">{m.role}</div>
                    <h3>{m.name}</h3>
                    {m.bio && <p>{m.bio}</p>}
                  </div>
                </div>
              ))}
            </div>
            <div style={{textAlign:'center',marginTop:48}}>
              <button className="btn-outline" onClick={()=>go('vision')}>View Full Board →</button>
            </div>
          </div>
        </section>
      )}

      {/* ACHIEVEMENTS PREVIEW */}
      <section className="section" id="achievements" style={{background:'var(--navy2)'}}>
        <div className="section-inner">
          <div className="sec-eyebrow">Our Honors</div>
          <h2 className="sec-title">What We've<br/><em>Achieved</em></h2>

        <div className="ach-grid">
          {staticAch.map((a,i)=>(

      {upcomingEvents.length > 0 && (
        <section className="section" style={{background:'var(--navy3)'}}>
          <div className="section-inner">
            <div className="sec-eyebrow">What's On</div>
            <h2 className="sec-title">Latest<br/><em>Events</em></h2>
            <div className="events-grid">
              {upcomingEvents.map(ev=>(

// Helper functions to compress images client-side and bypass Storage CORS blockages
const compressImageToBase64 = (file) => {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (event) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let width = img.width;
        let height = img.height;
        const max_size = 600; // Ideal resolution for sharp but extremely lightweight photos

        if (width > height) {
          if (width > max_size) {
            height *= max_size / width;
            width = max_size;
          }
        } else {
          if (height > max_size) {
            width *= max_size / height;
            height = max_size;
          }
        }
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);
        
        // Output as jpeg with 0.6 quality (highly compressed, ~20-40KB)
        const compressedBase64 = canvas.toDataURL('image/jpeg', 0.6);
        resolve(compressedBase64);
      };
      img.onerror = () => reject(new Error("Invalid image format."));
      img.src = event.target.result;
    };
    reader.onerror = (err) => reject(err);
    reader.readAsDataURL(file);
  });
};

const compressVideoToBase64 = (file) => {
  return new Promise((resolve, reject) => {
    if (file.size > 900 * 1024) { // Firestore limit is 1MB, we keep it safe under 900KB
      reject(new Error("Video must be under 900KB. For larger files, please use YouTube or Google Drive links."));
      return;
    }
    const reader = new FileReader();
    reader.onload = (event) => {
      resolve(event.target.result);
    };
    reader.onerror = (err) => reject(err);
    reader.readAsDataURL(file);
  });
};

                {/* Image Upload Selection */}

                  <div className="f-g">
                    <label>Profile Image (Upload from device)</label>
                    <div className="file-upload-box">
                      <span className="file-upload-icon">📷</span>
                      <span className="file-upload-text">
                        {bUploading ? 'Uploading...' : <span>Drag/Drop or <strong>Browse</strong></span>}
                      </span>
                      <input type="file" accept="image/*" onChange={handleBoardPhotoUpload} disabled={bUploading} />
                    </div>
                  </div>
                  <div className="f-g">
                    <label>Profile Image URL (Alternative)</label>
                    <input value={bForm.imageUrl} onChange={e=>setBForm(x=>({...x,imageUrl:e.target.value}))} placeholder="https://example.com/photo.jpg"/>
                  </div>
                </div>

                <div className="f-g"><label>Bio (optional)</label><textarea value={bForm.bio} onChange={e=>setBForm(x=>({...x,bio:e.target.value}))} placeholder="Short bio or description..."/></div>
                <button className="b-sub" onClick={addBoardMember} disabled={bSaving || bUploading}>
                  {bSaving && <span className="spinner"/>} Add Member →
                </button>
              </div>
              <hr className="dv"/>
              <div style={{fontSize:13,fontWeight:700,letterSpacing:1,textTransform:'uppercase',color:'var(--dimmest)',marginBottom:10}}>Current Members ({boardMembers.length})</div>
              {bLoading ? <div style={{color:'var(--dimmer)',padding:'12px 0'}}><span className="spinner"/>Loading...</div>
                : boardMembers.length===0
                  ? <div style={{color:'rgba(255,255,255,.22)',fontSize:13,padding:'9px 0'}}>No members added yet.</div>
                  : <div className="a-list">
                      {boardMembers.map(m=>(
                        <div className="a-item" key={m.id}>
                          <div className="a-ii"><strong>{m.name}</strong><span>{m.role}</span></div>
                          <button className="b-del" onClick={()=>delBoardMember(m.id)}>Delete</button>
                        </div>
                      ))}
                    </div>
              }
            </div>
          )}

          {/* ── EVENTS TAB ── */}
          {tab==='events' && (
            <div>
              <div className="admin-tab-title">Events & Activities</div>
              <div className="admin-tab-sub">Add conferences, workshops, seminars, and upload photos/videos directly.</div>
              <div className="f-form">
                <div className="f-row">
                  <div className="f-g"><label>Event Title *</label><input value={eForm.title} onChange={e=>setEForm(x=>({...x,title:e.target.value}))} placeholder="e.g. Drilling Workshop 2027"/></div>
                  <div className="f-g"><label>Date</label><input type="date" value={eForm.date} onChange={e=>setEForm(x=>({...x,date:e.target.value}))}/></div>
                </div>
                <div className="f-row">
                  <div className="f-g"><label>Type</label>
                    <select value={eForm.type} onChange={e=>setEForm(x=>({...x,type:e.target.value}))}>
                      {['Workshop','Conference','Seminar','Competition','Field Trip','Social','Webinar'].map(t=><option key={t}>{t}</option>)}
                    </select>
                  </div>
                  <div className="f-g"><label>Location</label><input value={eForm.location} onChange={e=>setEForm(x=>({...x,location:e.target.value}))} placeholder="e.g. Al-Azhar University Hall"/></div>
                </div>
                <div className="f-g"><label>Description</label><textarea value={eForm.description} onChange={e=>setEForm(x=>({...x,description:e.target.value}))} placeholder="Describe the event..."/></div>
                
                {/* Media Upload Selection (Image / Video) */}
                <div className="f-row">
                  <div className="f-g">
                    <label>Media Type</label>
                    <select value={eForm.mediaType} onChange={e=>setEForm(x=>({...x,mediaType:e.target.value}))}>
                      <option value="image">📸 Image (Photo)</option>
                      <option value="video">🎥 Video (MP4/WebM)</option>
                    </select>
                  </div>
                  
                  {eForm.mediaType === 'video' ? (
                    <div className="f-g">
                      <label>Upload Video from Device</label>
                      <div className="file-upload-box">
                        <span className="file-upload-icon">🎬</span>
                        <span className="file-upload-text">
                          {eUploading ? 'Uploading Video...' : <span>Drop video or <strong>Browse</strong></span>}
                        </span>
                        <input type="file" accept="video/*" onChange={(e) => handleEventMediaUpload(e, 'video')} disabled={eUploading} />
                      </div>
                    </div>
                  ) : (
                    <div className="f-g">
                      <label>Upload Image from Device</label>
                      <div className="file-upload-box">
                        <span className="file-upload-icon">🖼️</span>
                        <span className="file-upload-text">
                          {eUploading ? 'Uploading Image...' : <span>Drop image or <strong>Browse</strong></span>}
                        </span>
                        <input type="file" accept="image/*" onChange={(e) => handleEventMediaUpload(e, 'image')} disabled={eUploading} />
                      </div>
                    </div>
                  )}
                </div>

                <div className="f-row">
                  <div className="f-g">
                    <label>Cover Image URL (Fallback)</label>
                    <input value={eForm.imageUrl} onChange={e=>setEForm(x=>({...x,imageUrl:e.target.value}))} placeholder="https://example.com/event.jpg"/>
                  </div>
                  <div className="f-g">
                    <label>Video URL (Fallback)</label>
                    <input value={eForm.videoUrl} onChange={e=>setEForm(x=>({...x,videoUrl:e.target.value}))} placeholder="https://example.com/video.mp4"/>
                  </div>
                </div>

                <button className="b-sub" onClick={addEvent} disabled={eSaving || eUploading}>
                  {eSaving && <span className="spinner"/>} Add Event →
                </button>
              </div>
              <hr className="dv"/>
              <div style={{fontSize:13,fontWeight:700,letterSpacing:1,textTransform:'uppercase',color:'var(--dimmest)',marginBottom:10}}>Current Events ({events.length})</div>
              {eLoading ? <div style={{color:'var(--dimmer)',padding:'12px 0'}}><span className="spinner"/>Loading...</div>
                : events.length===0
                  ? <div style={{color:'rgba(255,255,255,.22)',fontSize:13,padding:'9px 0'}}>No events added yet.</div>
                  : <div className="a-list">
                      {events.map(ev=>(
                        <div className="a-item" key={ev.id}>
                          <div className="a-ii"><strong>{ev.title}</strong><span>{ev.type}{ev.date?` · ${ev.date}`:''}</span></div>
                          <button className="b-del" onClick={()=>delEvent(ev.id)}>Delete</button>
                        </div>
                      ))}
                    </div>
              }
            </div>
          )}

          {/* ── STATS TAB ── */}
          {tab==='stats' && (
            <div>
              <div className="admin-tab-title">Stats Counter</div>
              <div className="admin-tab-sub">Update the numbers shown in the global stats bar on the homepage.</div>
              {sLoading ? <div style={{color:'var(--dimmer)',padding:'12px 0'}}><span className="spinner"/>Loading...</div>
                : <div className="f-form">
                    <div className="f-row">
                      <div className="f-g"><label>Founded Year</label><input value={stats.founded} onChange={e=>setStats(x=>({...x,founded:e.target.value}))} placeholder="2005"/></div>
                      <div className="f-g"><label>Awards Count</label><input value={stats.awards} onChange={e=>setStats(x=>({...x,awards:e.target.value}))} placeholder="7+"/></div>
                    </div>
                    <div className="f-row">
                      <div className="f-g"><label>Regional Rank</label><input value={stats.rank} onChange={e=>setStats(x=>({...x,rank:e.target.value}))} placeholder="1st"/></div>
                      <div className="f-g"><label>Global Standing</label><input value={stats.global} onChange={e=>setStats(x=>({...x,global:e.target.value}))} placeholder="Top 5%"/></div>
                    </div>
                    <button className="b-sub" onClick={saveStats} disabled={sSaving}>
                      {sSaving && <span className="spinner"/>} Save Stats →
                    </button>
                  </div>
              }
              <hr className="dv"/>
              <div style={{background:'var(--navy3)',border:'1px solid var(--border)',borderRadius:6,padding:20,marginTop:8}}>
                <div style={{fontSize:11,fontWeight:700,letterSpacing:2,textTransform:'uppercase',color:'var(--dimmest)',marginBottom:14}}>Preview</div>
                <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:16}}>
                  {[['founded','Founded'],['awards','Awards'],['rank','Regional Rank'],['global','Global']].map(([k,l])=>(
                    <div key={k} style={{textAlign:'center'}}>
                      <div style={{fontFamily:"'Syne',sans-serif",fontSize:28,fontWeight:800,color:'var(--white)'}}>{stats[k]}</div>
                      <div style={{fontSize:10,fontWeight:600,letterSpacing:2,textTransform:'uppercase',color:'var(--dim)',marginTop:4}}>{l}</div>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function App(){
  const [page, setPage] = useState('home');
  const [pre, setPre] = useState(false);
  const [sc, setSc] = useState(false);
  const [mob, setMob] = useState(false);
  const [curX, setCurX] = useState(-100);
  const [curY, setCurY] = useState(-100);
  const [user, setUser] = useState(null);
  const [authLoading, setAuthLoading] = useState(true);

  const [boardMembers, setBoardMembers] = useState([]);
  const [events, setEvents] = useState([]);
  const [stats, setStats] = useState({founded:'2005',awards:'7+',rank:'1st',global:'Top 5%'});

  // Custom Modal System (Safe inside iframes)
  const [modalState, setModalState] = useState({ show: false, text: '', type: 'info', onConfirm: null });

  const showModal = (text, type = 'info') => {
    setModalState({ show: true, text, type, onConfirm: null });
  };

  const showConfirm = (text, onConfirm) => {
    setModalState({ show: true, text, type: 'confirm', onConfirm });
  };

  const closeModal = () => {
    setModalState({ show: false, text: '', type: 'info', onConfirm: null });
  };

  useEffect(()=>{
    const unsub = auth.onAuthStateChanged(u=>{ setUser(u); setAuthLoading(false); });
    return ()=>unsub();
  },[]);

  useEffect(()=>{ setTimeout(()=>setPre(true), 900); },[]);

  useEffect(()=>{
    const onScroll = ()=>setSc(window.scrollY>55);
    const onMouse = e=>{ setCurX(e.clientX); setCurY(e.clientY); };
    window.addEventListener('scroll',onScroll);
    window.addEventListener('mousemove',onMouse);
    return()=>{ window.removeEventListener('scroll',onScroll); window.removeEventListener('mousemove',onMouse); };
  },[]);

  useEffect(()=>{
    const unsubBoard = db.collection('boardMembers').orderBy('createdAt','desc').onSnapshot(snap=>{
      setBoardMembers(snap.docs.map(d=>({id:d.id,...d.data()})));
    }, ()=>{});

    const unsubEvents = db.collection('events').orderBy('createdAt','desc').onSnapshot(snap=>{
      setEvents(snap.docs.map(d=>({id:d.id,...d.data()})));
    }, ()=>{});

    db.collection('settings').doc('stats').get().then(doc=>{ if(doc.exists) setStats(doc.data()); }).catch(()=>{});

    return ()=>{ unsubBoard(); unsubEvents(); };
  },[]);

  const go = (p) => {
    setPage(p); setMob(false); window.scrollTo({top:0,behavior:'smooth'});
  };

  const handleLogout = async () => {
    await auth.signOut();
    go('home');
  };

  if(authLoading) return (
    <div className="loading-screen">
      <div className="spinner"/>
      <span style={{fontSize:12,letterSpacing:2,textTransform:'uppercase',color:'var(--dimmest)'}}>Loading SPE Al-Azhar...</span>
    </div>
  );

  return (
    <>
      <div className="cursor-dot" style={{left:curX,top:curY}}/>
      <div className="cursor-ring" style={{left:curX,top:curY}}/>

      {/* PRELOADER */}
      <div id="preloader" className={pre?'out':''}>
        <img src={"logo.jpg"} className="pre-logo" alt="SPE Al-Azhar Logo"/>
        <div className="pre-bar"><div className="pre-fill"/></div>
        <div className="pre-text">Season 26/27 Loading...</div>
      </div>

      {/* NAVIGATION */}
      <Nav page={page} go={go} user={user} onLogout={handleLogout} sc={sc} mob={mob} setMob={setMob}/>

      {/* PAGE ROUTING */}
      {page==='home' && <HomePage go={go} stats={stats} boardMembers={boardMembers} events={events} showModal={showModal}/>}
      {page==='vision' && <VisionPage go={go} boardMembers={boardMembers}/>}
      {page==='timeline' && <TimelinePage go={go}/>}
      {page==='events' && <EventsPage go={go} events={events}/>}
      {page==='admin' && (
        !user 
          ? <AdminLoginPage onLogin={()=>setPage('admin')}/>
          : <AdminPanel onLogout={handleLogout} showModal={showModal} showConfirm={showConfirm}/>
      )}

      {/* CUSTOM REACT MODAL SYSTEM */}
      {modalState.show && (
        <div className="custom-modal-overlay">
          <div className="custom-modal-box">
            <div className="custom-modal-icon">
              {modalState.type === 'success' ? '✅' : modalState.type === 'error' ? '❌' : modalState.type === 'confirm' ? '⚠️' : 'ℹ️'}
            </div>
            <div className="custom-modal-title">
              {modalState.type === 'success' ? 'Success' : modalState.type === 'error' ? 'Error' : modalState.type === 'confirm' ? 'Confirm Action' : 'Notification'}
            </div>
            <div className="custom-modal-text">{modalState.text}</div>
            <div className="custom-modal-actions">
              {modalState.type === 'confirm' ? (
                <>
                  <button className="btn-outline" style={{padding: '8px 24px'}} onClick={closeModal}>Cancel</button>
                  <button className="btn-gold" style={{padding: '8px 24px'}} onClick={() => { modalState.onConfirm(); closeModal(); }}>Yes, Delete</button>
                </>
              ) : (
                <button className="btn-primary" style={{padding: '8px 24px'}} onClick={closeModal}>Okay</button>
              )}
            </div>
          </div>
        </div>
      )}
    </>
  );
}

const container = document.getElementById('root');
const root = ReactDOM.createRoot(container);
root.render(<App/>);
</script>
</body>
</html>
